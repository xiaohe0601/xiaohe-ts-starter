ignoreWorkspaceRootCheck: true
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - docs
  - playground
  - packages/**
  - examples/**

catalogs:
  build:
    "@vitejs/plugin-vue": ^6.0.5
    tsdown: ^0.21.7
    vite: ^8.0.3
  cli:
    "@antfu/ni": ^30.0.0
    bumpp: ^11.0.1
    pncat: ^0.11.1
  frontend:
    "@vue/runtime-core": ^3.5.31
    vue: ^3.5.31
  lint:
    eslint: ^10.1.0
    lint-staged: ^16.4.0
    simple-git-hooks: ^2.13.1
  script:
    esno: ^4.8.0
  style:
    ress: ^5.0.2
  test:
    vitest: ^4.1.2
  tsc:
    typescript: ~6.0.2
    vue-tsc: ^3.2.6
  types:
    "@types/node": ^24.12.0
  xiaohe:
    "@xiaohe01/catalog-rules": ^0.0.4
    "@xiaohe01/eslint-config": ^6.0.0
    "@xiaohe01/tsconfig": ^3.1.0

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks